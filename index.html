<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 13 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>

    <button id="button1">Grow Larger</button>
    <button id="button2">Grow Smaller</button>
    <button id="button3">slide to the left</button>
    <button id="button4">slide to the right</button>

    <div class="avatar">
      <img
        src="https://www.khanacademy.org/images/avatars/svg/aqualine-sapling.svg"
        width="150"
      />
      <h1>Aqualine</h1>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
    
      // ======================== Button #1
      $("#button1").click(function () {
       $("img").animate({
        width: "300px"
       }, 1000);
       $("h1").animate({
        width: "400px",
        fontSize: "80px"
       }, 1000);
      });

      // ======================== Button #2
      $("#button2").click(function () {
        $("img").animate({
        width: "100px"
       }, 1000);
       $("h1").animate({
        width: "200px",
        fontSize: "40px"
       }, 1000);
      });

      // ======================== Button #3
      $("#button3").click(function () {
        $("img").animate({
          marginLeft: "0px"
        }, 1000);
      });

       // ======================== Button #3
      $("#button4").click(function () {
        $("img").animate({
          marginLeft: "200px"
        }, 1000);
      });
    
    
    
    </script>
  </body>
</html>
